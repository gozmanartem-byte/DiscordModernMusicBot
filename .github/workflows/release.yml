name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-zips:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build and package releases
        run: |
          chmod +x ./build-release-packages.sh
          ./build-release-packages.sh

      - name: Upload zip release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-zips
          path: dist/releases/*.zip

  build-windows-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build windows jar
        shell: pwsh
        run: mvn -q -DskipTests package -Pwindows-x86-64

      - name: Package Windows EXE
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }
          if ([string]::IsNullOrWhiteSpace($version) -or ($version -notmatch '^[0-9]+(\.[0-9]+){1,3}([.-][0-9A-Za-z]+)?$')) {
            [xml]$pom = Get-Content pom.xml
            $version = $pom.project.version
            if ($version.StartsWith("v")) {
              $version = $version.Substring(1)
            }
          }
          if ([string]::IsNullOrWhiteSpace($version) -or ($version -notmatch '^[0-9]+(\.[0-9]+){1,3}([.-][0-9A-Za-z]+)?$')) {
            throw "Could not resolve a valid semantic version for Windows installer build."
          }

          New-Item -ItemType Directory -Path dist/jpackage/input -Force | Out-Null
          New-Item -ItemType Directory -Path dist/releases -Force | Out-Null

          $jar = Get-ChildItem target -Filter "*-jar-with-dependencies.jar" | Select-Object -First 1
          if ($null -eq $jar) {
            throw "jar-with-dependencies artifact not found"
          }

          Copy-Item $jar.FullName dist/jpackage/input/DiscordModernMusicBot.jar -Force
          Copy-Item ModernMusicBot.properties.example dist/jpackage/input/ -Force
          Copy-Item README.md dist/jpackage/input/ -Force
          Copy-Item README_INSTALLATION.md dist/jpackage/input/ -Force
          Copy-Item LICENSE dist/jpackage/input/ -Force

          jpackage `
            --type exe `
            --name ModernMusicBot `
            --input dist/jpackage/input `
            --main-jar DiscordModernMusicBot.jar `
            --main-class com.artem.musicbot.ControlPanelApp `
            --dest dist/releases `
            --app-version $version `
            --vendor "DiscordModernMusicBot" `
            --description "ModernMusicBot desktop launcher" `
            --java-options "--enable-native-access=ALL-UNNAMED" `
            --win-shortcut `
            --win-menu

          $built = Get-ChildItem dist/releases -Filter "ModernMusicBot*.exe" | Select-Object -First 1
          if ($null -eq $built) {
            throw "Windows installer was not created"
          }
          $target = "dist/releases/DiscordModernMusicBot-v$version-windows-installer.exe"
          Move-Item $built.FullName $target -Force

      - name: Upload windows installer asset
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-installer
          path: dist/releases/*-windows-installer.exe

  build-macos-installer:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build macOS jar
        run: mvn -q -DskipTests package -Pmacos

      - name: Package macOS DMG
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-}"
          if [[ "$VERSION" == v* ]]; then
            VERSION="${VERSION#v}"
          fi
          if [[ -z "$VERSION" || ! "$VERSION" =~ ^[0-9]+(\.[0-9]+){1,3}([.-][0-9A-Za-z]+)?$ ]]; then
            VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version | tail -n 1)"
            if [[ "$VERSION" == v* ]]; then
              VERSION="${VERSION#v}"
            fi
          fi

          mkdir -p dist/jpackage/input dist/releases

          JAR_PATH="$(find target -maxdepth 1 -name '*-jar-with-dependencies.jar' | head -n 1)"
          if [[ -z "$JAR_PATH" ]]; then
            echo "jar-with-dependencies artifact not found" >&2
            exit 1
          fi

          cp "$JAR_PATH" dist/jpackage/input/DiscordModernMusicBot.jar
          cp ModernMusicBot.properties.example README.md README_INSTALLATION.md LICENSE dist/jpackage/input/

          # Build a macOS app image first so we can apply an ad-hoc signature.
          # This reduces "app is corrupted" launch failures from Gatekeeper on downloaded artifacts.
          jpackage \
            --type app-image \
            --name ModernMusicBot \
            --input dist/jpackage/input \
            --main-jar DiscordModernMusicBot.jar \
            --main-class com.artem.musicbot.ControlPanelApp \
            --icon src/main/resources/icon.icns \
            --dest dist/jpackage \
            --app-version "$VERSION" \
            --vendor "DiscordModernMusicBot" \
            --description "ModernMusicBot desktop launcher" \
            --java-options "--enable-native-access=ALL-UNNAMED"

          APP_IMAGE="dist/jpackage/ModernMusicBot.app"
          if [[ ! -d "$APP_IMAGE" ]]; then
            echo "macOS app image was not created" >&2
            exit 1
          fi

          # Ad-hoc signing does not require Apple certificates and improves local launch behavior.
          codesign --force --deep --sign - "$APP_IMAGE"
          codesign --verify --deep --strict --verbose=2 "$APP_IMAGE"

          jpackage \
            --type dmg \
            --name ModernMusicBot \
            --app-image "$APP_IMAGE" \
            --dest dist/releases \
            --app-version "$VERSION" \
            --vendor "DiscordModernMusicBot" \
            --description "ModernMusicBot desktop launcher"

          BUILT_DMG="$(find dist/releases -maxdepth 1 -name 'ModernMusicBot*.dmg' | head -n 1)"
          if [[ -z "$BUILT_DMG" ]]; then
            echo "macOS installer was not created" >&2
            exit 1
          fi
          mv "$BUILT_DMG" "dist/releases/DiscordModernMusicBot-v${VERSION}-macos-installer.dmg"

      - name: Upload macOS installer asset
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-installer
          path: dist/releases/*-macos-installer.dmg

  publish:
    runs-on: ubuntu-latest
    needs:
      - build-zips
      - build-windows-installer
      - build-macos-installer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-}"
          if [[ "$TAG" != v* ]]; then
            VERSION="$(grep -m1 '<version>' pom.xml | sed -E 's/.*<version>([^<]+)<\/version>.*/\1/')"
            TAG="v${VERSION}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download zip assets
        uses: actions/download-artifact@v4
        with:
          name: release-zips
          path: dist/releases

      - name: Download windows installer asset
        uses: actions/download-artifact@v4
        with:
          name: release-windows-installer
          path: dist/releases

      - name: Download macOS installer asset
        uses: actions/download-artifact@v4
        with:
          name: release-macos-installer
          path: dist/releases

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          files: dist/releases/*
          generate_release_notes: true
