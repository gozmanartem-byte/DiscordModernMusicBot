name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-zips:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build and package releases
        run: |
          chmod +x ./build-release-packages.sh
          ./build-release-packages.sh

      - name: Upload zip release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-zips
          path: dist/releases/*.zip

  build-windows-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build windows jar
        shell: pwsh
        run: mvn -q -DskipTests package -Pwindows-x86-64

      - name: Package Windows EXE
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }
          if ([string]::IsNullOrWhiteSpace($version) -or ($version -notmatch '^[0-9]+(\.[0-9]+){1,3}([.-][0-9A-Za-z]+)?$')) {
            [xml]$pom = Get-Content pom.xml
            $version = $pom.project.version
            if ($version.StartsWith("v")) {
              $version = $version.Substring(1)
            }
          }
          if ([string]::IsNullOrWhiteSpace($version) -or ($version -notmatch '^[0-9]+(\.[0-9]+){1,3}([.-][0-9A-Za-z]+)?$')) {
            throw "Could not resolve a valid semantic version for Windows installer build."
          }

          New-Item -ItemType Directory -Path dist/jpackage/input -Force | Out-Null
          New-Item -ItemType Directory -Path dist/releases -Force | Out-Null

          $jar = Get-ChildItem target -Filter "*-jar-with-dependencies.jar" | Select-Object -First 1
          if ($null -eq $jar) {
            throw "jar-with-dependencies artifact not found"
          }

          Copy-Item $jar.FullName dist/jpackage/input/DiscordModernMusicBot.jar -Force
          Copy-Item ModernMusicBot.properties.example dist/jpackage/input/ -Force
          Copy-Item README.md dist/jpackage/input/ -Force
          Copy-Item README_INSTALLATION.md dist/jpackage/input/ -Force
          Copy-Item LICENSE dist/jpackage/input/ -Force

          # Create a Windows .ico from the project PNG so installer/app icon matches macOS branding.
          $pngIconPath = "src/main/resources/app-icon.png"
          if (-not (Test-Path $pngIconPath)) {
            throw "PNG icon not found at $pngIconPath"
          }
          $icoPath = "dist/jpackage/ModernMusicBot.ico"
          $pngBytes = [System.IO.File]::ReadAllBytes($pngIconPath)
          $fs = [System.IO.File]::Create($icoPath)
          try {
            $bw = New-Object System.IO.BinaryWriter($fs)
            # ICONDIR header
            $bw.Write([UInt16]0)
            $bw.Write([UInt16]1)
            $bw.Write([UInt16]1)
            # ICONDIRENTRY (1 PNG-based image)
            $bw.Write([Byte]0)   # width 256 (0 means 256)
            $bw.Write([Byte]0)   # height 256 (0 means 256)
            $bw.Write([Byte]0)   # palette
            $bw.Write([Byte]0)   # reserved
            $bw.Write([UInt16]1) # color planes
            $bw.Write([UInt16]32)# bits per pixel
            $bw.Write([UInt32]$pngBytes.Length)
            $bw.Write([UInt32]22) # offset to image data
            $bw.Write($pngBytes)
            $bw.Flush()
          }
          finally {
            $fs.Dispose()
          }

          # Build app image first, then package installer from it for more stable EXE output.
          jpackage `
            --type app-image `
            --name ModernMusicBot `
            --input dist/jpackage/input `
            --main-jar DiscordModernMusicBot.jar `
            --main-class com.artem.musicbot.ControlPanelApp `
            --icon $icoPath `
            --dest dist/jpackage `
            --app-version $version `
            --vendor "DiscordModernMusicBot" `
            --description "ModernMusicBot desktop launcher" `
            --java-options "--enable-native-access=ALL-UNNAMED"

          $appImage = "dist/jpackage/ModernMusicBot"
          if (-not (Test-Path $appImage)) {
            throw "Windows app image was not created"
          }

          jpackage `
            --type msi `
            --name ModernMusicBot `
            --app-image $appImage `
            --icon $icoPath `
            --dest dist/releases `
            --app-version $version `
            --vendor "DiscordModernMusicBot" `
            --description "ModernMusicBot desktop launcher" `
            --win-shortcut `
            --win-menu `
            --win-menu-group "ModernMusicBot" `
            --win-dir-chooser `
            --win-per-user-install `
            --win-upgrade-uuid "4f8d1f3b-9f6b-4d28-9c58-5e55b7c4d7a1"

          $builtMsi = Get-ChildItem dist/releases -Filter "ModernMusicBot*.msi" | Select-Object -First 1
          if ($null -eq $builtMsi) {
            throw "Windows MSI installer was not created"
          }
          $msiTarget = "dist/releases/DiscordModernMusicBot-v$version-windows-installer.msi"
          Move-Item $builtMsi.FullName $msiTarget -Force

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y

      - name: Package Windows EXE (branded)
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }
          if ([string]::IsNullOrWhiteSpace($version) -or ($version -notmatch '^[0-9]+(\.[0-9]+){1,3}([.-][0-9A-Za-z]+)?$')) {
            [xml]$pom = Get-Content pom.xml
            $version = $pom.project.version
            if ($version.StartsWith("v")) {
              $version = $version.Substring(1)
            }
          }
          if ([string]::IsNullOrWhiteSpace($version) -or ($version -notmatch '^[0-9]+(\.[0-9]+){1,3}([.-][0-9A-Za-z]+)?$')) {
            throw "Could not resolve a valid semantic version for branded Windows installer build."
          }
          $makensis = "C:\\Program Files (x86)\\NSIS\\makensis.exe"
          if (-not (Test-Path $makensis)) {
            throw "NSIS compiler not found at $makensis"
          }
          & $makensis "/DAPP_VERSION=$version" "installer\\ModernMusicBot.nsi"
          $builtExe = Get-ChildItem dist/releases -Filter "DiscordModernMusicBot-v$version-windows-installer.exe" | Select-Object -First 1
          if ($null -eq $builtExe) {
            throw "Branded Windows EXE installer was not created"
          }

      - name: Upload windows installer asset
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-installer
          path: |
            dist/releases/*-windows-installer.exe
            dist/releases/*-windows-installer.msi

  build-linux-installers-x86-64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Install Linux packaging deps
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm

      - name: Build Linux x86_64 installers (AppImage, deb, rpm)
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME:-}"
          if [[ "$VERSION" != v* ]]; then
            VERSION="$(grep -m1 '<version>' pom.xml | sed -E 's/.*<version>([^<]+)<\/version>.*/\1/')"
          fi
          VERSION="${VERSION#v}"

          rm -rf dist/jpackage dist/releases dist/appimage
          mkdir -p dist/jpackage/input dist/releases

          mvn -q -DskipTests package -Plinux-x86-64

          JAR="$(find target -maxdepth 1 -name '*-jar-with-dependencies.jar' | head -n 1)"
          if [[ -z "$JAR" ]]; then
            echo "jar-with-dependencies artifact not found" >&2
            exit 1
          fi

          cp "$JAR" dist/jpackage/input/DiscordModernMusicBot.jar
          cp ModernMusicBot.properties.example dist/jpackage/input/
          cp README.md dist/jpackage/input/
          cp README_INSTALLATION.md dist/jpackage/input/
          cp LICENSE dist/jpackage/input/

          jpackage \
            --type app-image \
            --name ModernMusicBot \
            --input dist/jpackage/input \
            --main-jar DiscordModernMusicBot.jar \
            --main-class com.artem.musicbot.ControlPanelApp \
            --icon src/main/resources/app-icon.png \
            --dest dist/jpackage \
            --app-version "$VERSION" \
            --vendor "DiscordModernMusicBot" \
            --description "ModernMusicBot desktop launcher" \
            --java-options "--enable-native-access=ALL-UNNAMED"

          jpackage \
            --type deb \
            --name ModernMusicBot \
            --input dist/jpackage/input \
            --main-jar DiscordModernMusicBot.jar \
            --main-class com.artem.musicbot.ControlPanelApp \
            --icon src/main/resources/app-icon.png \
            --dest dist/releases \
            --app-version "$VERSION" \
            --vendor "DiscordModernMusicBot" \
            --description "ModernMusicBot desktop launcher" \
            --linux-shortcut \
            --linux-menu-group "Audio;Music;" \
            --java-options "--enable-native-access=ALL-UNNAMED"

          jpackage \
            --type rpm \
            --name ModernMusicBot \
            --input dist/jpackage/input \
            --main-jar DiscordModernMusicBot.jar \
            --main-class com.artem.musicbot.ControlPanelApp \
            --icon src/main/resources/app-icon.png \
            --dest dist/releases \
            --app-version "$VERSION" \
            --vendor "DiscordModernMusicBot" \
            --description "ModernMusicBot desktop launcher" \
            --linux-shortcut \
            --linux-menu-group "Audio;Music;" \
            --java-options "--enable-native-access=ALL-UNNAMED"

          DEB="$(ls dist/releases/*.deb | head -n 1)"
          RPM="$(ls dist/releases/*.rpm | head -n 1)"
          mv "$DEB" "dist/releases/DiscordModernMusicBot-v${VERSION}-linux-x86_64.deb"
          mv "$RPM" "dist/releases/DiscordModernMusicBot-v${VERSION}-linux-x86_64.rpm"

          APPDIR="dist/appimage/ModernMusicBot.AppDir"
          mkdir -p "$APPDIR/usr/lib/ModernMusicBot" "$APPDIR/usr/bin" \
                   "$APPDIR/usr/share/applications" "$APPDIR/usr/share/icons/hicolor/256x256/apps"

          cp -r dist/jpackage/ModernMusicBot/* "$APPDIR/usr/lib/ModernMusicBot/"
          ln -s ../lib/ModernMusicBot/bin/ModernMusicBot "$APPDIR/usr/bin/ModernMusicBot"

          printf '%s\n' \
            '[Desktop Entry]' \
            'Type=Application' \
            'Name=ModernMusicBot' \
            'Exec=ModernMusicBot' \
            'Icon=modernmusicbot' \
            'Categories=Audio;Music;' \
            'Terminal=false' \
            > "$APPDIR/usr/share/applications/modernmusicbot.desktop"

          cp src/main/resources/app-icon.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/modernmusicbot.png"
          cp "$APPDIR/usr/share/applications/modernmusicbot.desktop" "$APPDIR/modernmusicbot.desktop"
          cp "$APPDIR/usr/share/icons/hicolor/256x256/apps/modernmusicbot.png" "$APPDIR/modernmusicbot.png"

          printf '%s\n' \
            '#!/bin/sh' \
            'HERE="$(dirname "$(readlink -f "$0")")"' \
            'exec "$HERE/usr/bin/ModernMusicBot" "$@"' \
            > "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"

          curl -L -o appimagetool.AppImage https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage
          ./appimagetool.AppImage --appimage-extract
          ARCH=x86_64 ./squashfs-root/usr/bin/appimagetool "$APPDIR" "dist/releases/DiscordModernMusicBot-v${VERSION}-linux-x86_64.AppImage"

      - name: Upload Linux x86_64 installers
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-installers-x86-64
          path: dist/releases/*-linux-x86_64.*

  build-linux-installers-aarch64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU for arm64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build Linux aarch64 installers (AppImage, deb, rpm)
        run: |
          docker run --rm --platform=linux/arm64 \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace ubuntu:24.04 bash -lc '
              set -euo pipefail
              apt-get update
              apt-get install -y ca-certificates curl git maven zip fakeroot rpm dpkg-dev

              VERSION="${GITHUB_REF_NAME:-}"
              if [[ "$VERSION" != v* ]]; then
                VERSION="$(grep -m1 "<version>" pom.xml | sed -E "s/.*<version>([^<]+)<\\/version>.*/\\1/")"
              fi
              VERSION="${VERSION#v}"

              rm -rf dist/jpackage dist/releases dist/appimage
              mkdir -p dist/jpackage/input dist/releases

              curl -L -o /tmp/jdk.tar.gz "https://api.adoptium.net/v3/binary/latest/25/ga/linux/aarch64/jdk/hotspot/normal/eclipse"
              mkdir -p /opt/jdk
              tar -xzf /tmp/jdk.tar.gz -C /opt/jdk
              export JAVA_HOME=$(ls -d /opt/jdk/jdk-* | head -n 1)
              export PATH="$JAVA_HOME/bin:$PATH"

              mvn -q -DskipTests package -Plinux-aarch64

              JAR="$(find target -maxdepth 1 -name "*-jar-with-dependencies.jar" | head -n 1)"
              if [[ -z "$JAR" ]]; then
                echo "jar-with-dependencies artifact not found" >&2
                exit 1
              fi

              cp "$JAR" dist/jpackage/input/DiscordModernMusicBot.jar
              cp ModernMusicBot.properties.example dist/jpackage/input/
              cp README.md dist/jpackage/input/
              cp README_INSTALLATION.md dist/jpackage/input/
              cp LICENSE dist/jpackage/input/

              jpackage \
                --type app-image \
                --name ModernMusicBot \
                --input dist/jpackage/input \
                --main-jar DiscordModernMusicBot.jar \
                --main-class com.artem.musicbot.ControlPanelApp \
                --icon src/main/resources/app-icon.png \
                --dest dist/jpackage \
                --app-version "$VERSION" \
                --vendor "DiscordModernMusicBot" \
                --description "ModernMusicBot desktop launcher" \
                --java-options "--enable-native-access=ALL-UNNAMED"

              jpackage \
                --type deb \
                --name ModernMusicBot \
                --input dist/jpackage/input \
                --main-jar DiscordModernMusicBot.jar \
                --main-class com.artem.musicbot.ControlPanelApp \
                --icon src/main/resources/app-icon.png \
                --dest dist/releases \
                --app-version "$VERSION" \
                --vendor "DiscordModernMusicBot" \
                --description "ModernMusicBot desktop launcher" \
                --linux-shortcut \
                --linux-menu-group "Audio;Music;" \
                --java-options "--enable-native-access=ALL-UNNAMED"

              jpackage \
                --type rpm \
                --name ModernMusicBot \
                --input dist/jpackage/input \
                --main-jar DiscordModernMusicBot.jar \
                --main-class com.artem.musicbot.ControlPanelApp \
                --icon src/main/resources/app-icon.png \
                --dest dist/releases \
                --app-version "$VERSION" \
                --vendor "DiscordModernMusicBot" \
                --description "ModernMusicBot desktop launcher" \
                --linux-shortcut \
                --linux-menu-group "Audio;Music;" \
                --java-options "--enable-native-access=ALL-UNNAMED"

              DEB="$(ls dist/releases/*.deb | head -n 1)"
              RPM="$(ls dist/releases/*.rpm | head -n 1)"
              mv "$DEB" "dist/releases/DiscordModernMusicBot-v${VERSION}-linux-aarch64.deb"
              mv "$RPM" "dist/releases/DiscordModernMusicBot-v${VERSION}-linux-aarch64.rpm"

              APPDIR="dist/appimage/ModernMusicBot.AppDir"
              mkdir -p "$APPDIR/usr/lib/ModernMusicBot" "$APPDIR/usr/bin" \
                       "$APPDIR/usr/share/applications" "$APPDIR/usr/share/icons/hicolor/256x256/apps"

              cp -r dist/jpackage/ModernMusicBot/* "$APPDIR/usr/lib/ModernMusicBot/"
              ln -s ../lib/ModernMusicBot/bin/ModernMusicBot "$APPDIR/usr/bin/ModernMusicBot"

              printf '%s\n' \
                "[Desktop Entry]" \
                "Type=Application" \
                "Name=ModernMusicBot" \
                "Exec=ModernMusicBot" \
                "Icon=modernmusicbot" \
                "Categories=Audio;Music;" \
                "Terminal=false" \
                > "$APPDIR/usr/share/applications/modernmusicbot.desktop"

              cp src/main/resources/app-icon.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/modernmusicbot.png"
              cp "$APPDIR/usr/share/applications/modernmusicbot.desktop" "$APPDIR/modernmusicbot.desktop"
              cp "$APPDIR/usr/share/icons/hicolor/256x256/apps/modernmusicbot.png" "$APPDIR/modernmusicbot.png"

              printf '%s\n' \
                "#!/bin/sh" \
                "HERE=\"\$(dirname \"\$(readlink -f \"\$0\")\")\"" \
                "exec \"\$HERE/usr/bin/ModernMusicBot\" \"\$@\"" \
                > "$APPDIR/AppRun"
              chmod +x "$APPDIR/AppRun"

              curl -L -o appimagetool.AppImage https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-aarch64.AppImage
              chmod +x appimagetool.AppImage
              ./appimagetool.AppImage --appimage-extract
              ARCH=aarch64 ./squashfs-root/usr/bin/appimagetool "$APPDIR" "dist/releases/DiscordModernMusicBot-v${VERSION}-linux-aarch64.AppImage"
            '

      - name: Upload Linux aarch64 installers
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-installers-aarch64
          path: dist/releases/*-linux-aarch64.*

  build-macos-installer:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Package macOS DMG
        shell: bash
        run: |
          chmod +x ./build-dmg.sh
          ./build-dmg.sh

      - name: Upload macOS installer asset
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-dmg
          path: dist/releases/*-macos*.dmg

  publish:
    runs-on: ubuntu-latest
    needs:
      - build-zips
      - build-windows-installer
      - build-macos-installer
      - build-linux-installers-x86-64
      - build-linux-installers-aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-}"
          if [[ "$TAG" != v* ]]; then
            VERSION="$(grep -m1 '<version>' pom.xml | sed -E 's/.*<version>([^<]+)<\/version>.*/\1/')"
            TAG="v${VERSION}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download zip assets
        uses: actions/download-artifact@v4
        with:
          name: release-zips
          path: dist/releases

      - name: Download windows installer asset
        uses: actions/download-artifact@v4
        with:
          name: release-windows-installer
          path: dist/releases

      - name: Download macOS installer asset
        uses: actions/download-artifact@v4
        with:
          name: release-macos-dmg
          path: dist/releases

      - name: Download Linux x86_64 installer assets
        uses: actions/download-artifact@v4
        with:
          name: release-linux-installers-x86-64
          path: dist/releases

      - name: Download Linux aarch64 installer assets
        uses: actions/download-artifact@v4
        with:
          name: release-linux-installers-aarch64
          path: dist/releases

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          files: dist/releases/*
          append_body: false
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
